# /etc/nginx/conf.d/backend-api.conf

upstream admin_backend_upstream {
  server 127.0.0.1:8001;
}

upstream community_backend_upstream {
  server 127.0.0.1:50051;
}

upstream stats_backend_upstream {
  server 127.0.0.1:8002;
}

server {
  listen 80;
  server_name api.admin.sven-family.asia;
  return 301 https://$host$request_uri;
}

server {
  listen 80;
  server_name api.club.sven-family.asia;
  return 301 https://$host$request_uri;
}

server {
  listen 80;
  server_name api.stats.sven-family.asia;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.admin.sven-family.asia;

  ssl_certificate /etc/letsencrypt/live/api.admin.sven-family.asia/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.admin.sven-family.asia/privkey.pem;

  location / {
    proxy_pass http://admin_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl http2;
  server_name api.club.sven-family.asia;

  ssl_certificate /etc/letsencrypt/live/api.club.sven-family.asia/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.club.sven-family.asia/privkey.pem;

  location / {
    proxy_pass http://community_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl http2;
  server_name api.stats.sven-family.asia;

  ssl_certificate /etc/letsencrypt/live/api.stats.sven-family.asia/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.stats.sven-family.asia/privkey.pem;

  location / {
    proxy_pass http://stats_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
